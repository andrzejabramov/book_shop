<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="header">
        <div class="header__elements">
          <div class="header__logo">Bookshop</div>
          <nav class="header__nav">
            <a href="#" class="header__link">Books</a>
            <a href="#" class="header__link">Audiobooks</a>
            <a href="#" class="header__link">Stationery & gifts</a>
            <a href="#" class="header__link">Blog</a>
          </nav>
          <div class="header__actions">
            <button
              class="header__btn header__btn--account"
              aria-label="Account"
            >
              <img src="/img/user.svg" alt="Account" />
            </button>
            <button class="header__btn header__btn--search" aria-label="Search">
              <img src="/img/search.svg" alt="Search" />
            </button>
            <button class="header__btn header__btn--cart" aria-label="Cart">
              <img src="/img/shop_bag.svg" alt="Cart" />
            </button>
          </div>
        </div>
        <div class="header__cart-badge">
          <div class="header__badge-ellipse"></div>
          <span class="header__badge-digit">1</span>
        </div>
      </header>

      <main class="main-grid">
        <section class="banner" id="slider-container"></section>
        <div class="grid-separator">
          <span class="grid-separator__content"></span>
        </div>

        <!-- ✅ Чистая сетка: один шаблон, JS сделает 6 клонов -->
        <div class="card-grid" id="card-grid">
          <template id="card-template">
            <article class="card" data-book-id="0">
              <div class="card__cover">
                <img class="card__image" alt="Cover" loading="lazy" />
              </div>
              <div class="card__info">
                <p class="card__author"></p>
                <h3 class="card__name"></h3>
                <div class="card__rating">
                  <div class="card__stars"></div>
                  <span class="card__reviews"></span>
                </div>
                <p class="card__describe"></p>
                <span class="card__price"></span>
                <button class="card__btn load-more-btn" data-state="default">
                  Buy now
                </button>
              </div>
            </article>
          </template>
        </div>

        <div class="category-panel"><ul class="category-panel__list"></ul></div>
        <!-- 2. Интерактивный слой (строго слева, не заходит на карточки) -->
        <div class="category-list-box">
          <ul class="category-list"></ul>
        </div>
        <div class="row-placeholder">
          <button class="load-more-btn">
            <span class="load-more-btn__text">LOAD MORE</span>
          </button>
        </div>
        <div class="cta-block cta-block--elm-1">
          <div class="cta-block__content">
            <p class="cta-block__text">Change old book on new</p>
          </div>
          <a href="#" class="cta-block__link">
            <img src="/img/direct.svg" alt="" class="cta-block__arrow" />
          </a>
        </div>
        <div class="cta-block cta-block--elm-2">
          <div class="cta-block__content">
            <p class="cta-block__text">top 100 books 2022</p>
          </div>
          <a href="#" class="cta-block__link">
            <img src="/img/direct.svg" alt="" class="cta-block__arrow" />
          </a>
        </div>
      </main>
    </div>
    <script defer src="/js/main.js"></script>
  </body>
</html>
