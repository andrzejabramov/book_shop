<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshop</title>
    <!-- ✅ Импорт шрифта по спецификации -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-wrapper">
      <!-- ✅ HEADER (BEM) -->
      <header class="header">
        <div class="header__elements">
          <div class="header__logo">Bookshop</div>

          <nav class="header__nav">
            <a href="#" class="header__link">Books</a>
            <a href="#" class="header__link">Audiobooks</a>
            <a href="#" class="header__link">Stationery & gifts</a>
            <a href="#" class="header__link">Blog</a>
          </nav>

          <div class="header__actions">
            <button
              class="header__btn header__btn--account"
              aria-label="Account"
            >
              <img src="/img/user.svg" alt="Account" />
            </button>
            <button class="header__btn header__btn--search" aria-label="Search">
              <img src="/img/search.svg" alt="Search" />
            </button>
            <button class="header__btn header__btn--cart" aria-label="Cart">
              <img src="/img/shop_bag.svg" alt="Cart" />
            </button>
          </div>
        </div>
        <!-- ✅ Бейдж корзины -->
        <div class="header__cart-badge">
          <div class="header__badge-ellipse"></div>
          <span class="header__badge-digit">1</span>
        </div>
      </header>

      <!-- ✅ MAIN GRID (оставляем без изменений) -->
      <main class="main-grid">
        <section class="banner" id="slider-container"></section>
        <!-- ✅ Новый разделитель -->
        <div class="grid-separator">
          <span class="grid-separator__content"></span>
        </div>
        <div class="card-grid">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
          <div class="card">Card 4</div>
          <div class="card">Card 5</div>
          <div class="card">Card 6</div>
        </div>
        <div class="row-placeholder">
          <button class="load-more-btn">
            <span class="load-more-bt__text">Load more</span>
          </button>
        </div>

        <!-- ✅ Блоки-призывы (CTA) -->
        <div class="cta-block cta-block--elm-1">
          <div class="cta-block__content">
            <p class="cta-block__text">Change old book on new</p>
          </div>
          <img src="/img/direct.svg" alt="" class="cta-block__arrow" />
        </div>

        <div class="cta-block cta-block--elm-2">
          <div class="cta-block__content">
            <p class="cta-block__text">top 100 books 2022</p>
          </div>
          <img src="/img/direct.svg" alt="" class="cta-block__arrow" />
        </div>
      </main>
    </div>

    <script defer src="/js/main.js"></script>
  </body>
</html>
